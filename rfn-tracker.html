<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RFN Tracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>RFN Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;width:100vw;}

/* HEADER */
#hdr{flex-shrink:0;background:#0a0a0a;border-bottom:1px solid #1f2937;padding:5px 8px 4px;}
#hr1{display:flex;justify-content:space-between;align-items:center;}
#pk-el{font-family:'Courier New',monospace;font-size:26px;font-weight:700;color:#16a34a;letter-spacing:.5px;line-height:1;}
#pk-el.blink{animation:bpk .4s infinite alternate;}
@keyframes bpk{from{color:#ef4444;opacity:1}to{color:#7f1d1d;opacity:.35}}
#clock-el{font-family:'Courier New',monospace;font-size:13px;color:#9ca3af;}
#hr2{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:3px;}
.b{font-size:9px;padding:1px 5px;border-radius:99px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.bg{background:#1f2937;color:#9ca3af;}
.gr{background:#14532d;color:#4ade80;}
.or{background:#431407;color:#fb923c;}
.rd{background:#450a0a;color:#f87171;}
.bl{background:#1e3a5f;color:#60a5fa;}
.yw{background:#422006;color:#fbbf24;}
#ligne-el{font-size:10px;color:#6b7280;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#vmx-wrap{height:4px;background:#1f2937;border-radius:2px;margin-top:3px;display:none;overflow:hidden;}
#vmx-bar{height:100%;width:0%;border-radius:2px;transition:width .4s,background .4s;background:#16a34a;}
#hr3{display:flex;align-items:center;gap:6px;margin-top:3px;}
.bxs{font-size:10px;padding:2px 8px;border-radius:5px;border:1px solid #374151;background:#1f2937;color:#fff;cursor:pointer;}
.bxs:active{background:#374151;}
#chrono-el{font-family:'Courier New',monospace;font-size:11px;color:#9ca3af;}

/* MAIN */
#main{flex:1;display:flex;overflow:hidden;position:relative;min-height:0;}

/* MAP */
#map-wrap{flex:1;position:relative;overflow:hidden;min-width:0;}
#map{position:absolute;inset:0;}
#flash{position:absolute;inset:0;background:red;opacity:0;pointer-events:none;z-index:500;transition:opacity .15s;}

.mbt{position:absolute;z-index:900;background:rgba(0,0,0,.78);border:1px solid #374151;
  color:#fff;border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;
  user-select:none;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.mbt:active{background:rgba(255,255,255,.15);}
#btn-hup{top:10px;right:10px;}
#btn-ctr{top:44px;right:10px;display:none;}

#bb{position:absolute;bottom:10px;left:8px;z-index:900;display:flex;gap:5px;flex-wrap:wrap;}
.pill{background:rgba(0,0,0,.78);border:1px solid #374151;color:#fff;
  border-radius:99px;padding:5px 10px;font-size:10px;cursor:pointer;
  user-select:none;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.pill:active{background:rgba(255,255,255,.1);}
.pill.on{border-color:#16a34a;color:#4ade80;}

#legend{position:absolute;bottom:50px;right:8px;z-index:900;
  background:rgba(0,0,0,.82);border:1px solid #374151;border-radius:6px;
  padding:5px 7px;font-size:9px;line-height:1.9;color:#d1d5db;min-width:90px;}
.leg-row{display:flex;align-items:center;gap:5px;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-line{width:14px;height:3px;flex-shrink:0;border-radius:2px;}

/* TIMELINE */
#tl-panel{width:35%;max-width:150px;min-width:100px;background:#0a0a0a;
  border-left:1px solid #1f2937;display:flex;flex-direction:column;overflow:hidden;}
#tl-hdr{padding:4px 5px;border-bottom:1px solid #1f2937;font-size:9px;color:#6b7280;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#tl-body{flex:1;position:relative;overflow:hidden;min-height:0;}
#tl-arr{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  z-index:10;pointer-events:none;height:1px;}
#tl-arr::before{content:'>';color:#fbbf24;font-size:14px;font-weight:700;
  position:absolute;left:2px;top:50%;transform:translateY(-50%);font-family:'Courier New',monospace;}
#tl-arr::after{content:'';position:absolute;left:18px;right:0;top:0;
  height:1px;background:#fbbf24;opacity:.4;}
#tl-track{position:absolute;left:0;right:0;top:0;will-change:transform;}
.tl-rail{position:absolute;left:16px;top:0;bottom:0;width:2px;background:#374151;z-index:0;}
.si{position:absolute;left:0;right:0;height:52px;display:flex;align-items:center;
  padding-left:24px;padding-right:3px;}
.si-dot{position:absolute;left:12px;width:9px;height:9px;border-radius:50%;
  background:#374151;border:2px solid #6b7280;transform:translateX(-50%);z-index:1;}
.si-info{display:flex;flex-direction:column;overflow:hidden;flex:1;}
.si-name{font-size:9px;color:#e5e7eb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;}
.si-pk{font-family:'Courier New',monospace;font-size:8px;color:#6b7280;}
.si-dist{font-size:9px;font-weight:700;color:#f97316;margin-top:1px;}
.si-dist.near{color:#ef4444;}
.si-dist.vnear{color:#b91c1c;animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.si.frozen .si-name{font-size:11px;font-weight:700;color:#fbbf24;line-height:1.2;}
.si.frozen .si-dot{background:#fbbf24;border-color:#fbbf24;}
.si.frozen{background:rgba(251,191,36,.06);}
.si.passed{opacity:.16;}
.si-type{font-size:7px;padding:0 3px;border-radius:3px;display:inline-block;margin-left:2px;}
.si-type.gare{background:#1e3a5f;color:#60a5fa;}
.si-type.ite{background:#2e1065;color:#c4b5fd;}
.si-type.triage{background:#431407;color:#fb923c;}

/* LOG */
#log-panel{position:fixed;inset:0;z-index:2000;background:#0a0a0a;
  transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;}
#log-panel.open{transform:translateX(0);}
#log-hdr{padding:12px;border-bottom:1px solid #1f2937;display:flex;
  justify-content:space-between;align-items:center;font-weight:700;font-size:14px;flex-shrink:0;}
#log-close{font-size:22px;cursor:pointer;color:#6b7280;}
#log-list{flex:1;overflow-y:auto;padding:8px;}
.log-e{border:1px solid #1f2937;border-radius:6px;padding:6px 8px;margin-bottom:5px;
  font-size:11px;line-height:1.7;}
.lt{color:#6b7280;font-family:monospace;}
.lg{color:#fbbf24;font-weight:600;}
.ld{color:#9ca3af;}
#log-foot{padding:8px 12px;border-top:1px solid #1f2937;flex-shrink:0;}
#btn-exp{width:100%;padding:8px;background:#16a34a;color:#fff;border:none;
  border-radius:6px;font-size:13px;cursor:pointer;}

/* LAYERS */
#layers-panel{position:fixed;inset:0;z-index:2000;background:#0a0a0a;
  transform:translateX(-100%);transition:transform .3s ease;display:flex;flex-direction:column;}
#layers-panel.open{transform:translateX(0);}
#layers-hdr{padding:12px;border-bottom:1px solid #1f2937;display:flex;
  justify-content:space-between;align-items:center;font-weight:700;font-size:14px;flex-shrink:0;}
#layers-close{font-size:22px;cursor:pointer;color:#6b7280;}
#layers-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.layer-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
  background:#111827;border-radius:8px;border:1px solid #1f2937;}
.layer-name{font-size:13px;font-weight:600;color:#e5e7eb;}
.layer-desc{font-size:10px;color:#6b7280;margin-top:2px;}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.slider{position:absolute;inset:0;background:#374151;border-radius:99px;cursor:pointer;transition:background .2s;}
.slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;top:3px;
  background:#fff;border-radius:50%;transition:transform .2s;}
.toggle input:checked+.slider{background:#16a34a;}
.toggle input:checked+.slider::before{transform:translateX(16px);}

/* PWA banner */
#install-banner{position:fixed;bottom:0;left:0;right:0;z-index:3000;background:#111827;
  border-top:1px solid #374151;padding:10px 14px;display:flex;align-items:center;
  justify-content:space-between;font-size:12px;gap:8px;}
#install-banner.hidden{display:none;}
#btn-install{padding:6px 14px;background:#16a34a;border:none;border-radius:6px;
  color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
#btn-install-dismiss{background:none;border:none;color:#6b7280;font-size:18px;cursor:pointer;padding:2px 6px;}

/* Loading overlay */
#loading{position:fixed;inset:0;background:#0a0a0a;z-index:4000;display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#loading.done{display:none;}
#loading-bar-wrap{width:200px;height:4px;background:#1f2937;border-radius:2px;overflow:hidden;}
#loading-bar{height:100%;width:0%;background:#16a34a;border-radius:2px;transition:width .3s;}
#loading-msg{font-size:12px;color:#6b7280;}
#loading-title{font-size:16px;font-weight:700;color:#16a34a;letter-spacing:1px;}

.maplibregl-ctrl-attrib{font-size:9px !important;}
.maplibregl-ctrl-bottom-right{bottom:44px !important;}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div id="loading-title">RFN TRACKER</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-msg">Chargement...</div>
</div>

<div id="app">
  <!-- HEADER -->
  <div id="hdr">
    <div id="hr1">
      <div id="pk-el">PK --+---</div>
      <div id="clock-el">--:--:--</div>
    </div>
    <div id="hr2">
      <span id="b-spd"  class="b bg">-- km/h</span>
      <span id="b-cap"  class="b bg">-- --</span>
      <span id="b-voie" class="b bg">voie --m</span>
      <span id="b-gps"  class="b bg">GPS --m</span>
      <span id="b-vmax" class="b bg" style="display:none">Vmax --</span>
      <span id="b-seg"  class="b bg" style="display:none">--+--- --+---</span>
    </div>
    <div id="ligne-el">--</div>
    <div id="vmx-wrap"><div id="vmx-bar"></div></div>
    <div id="hr3">
      <button class="bxs" id="btn-chr">DEPART</button>
      <span id="chrono-el">00:00:00</span>
      <span id="b-odo" class="b bg" style="margin-left:auto">0.0 km</span>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="map-wrap">
      <div id="map"></div>
      <div id="flash"></div>
      <button class="mbt" id="btn-hup">Heading N</button>
      <button class="mbt" id="btn-ctr">Centrer</button>
      <div id="legend">
        <div class="leg-row"><div class="leg-line" style="background:#16a34a"></div>Voie ferree</div>
        <div class="leg-row"><div class="leg-dot" style="background:#3b82f6"></div>Gare voyageurs</div>
        <div class="leg-row"><div class="leg-dot" style="background:#6b7280"></div>Gare fret</div>
        <div class="leg-row"><div class="leg-dot" style="background:#8b5cf6"></div>ITE</div>
        <div class="leg-row"><div class="leg-dot" style="background:#f97316"></div>Triage</div>
        <div class="leg-row"><div class="leg-line" style="background:#22d3ee"></div>Trace GPS</div>
      </div>
      <div id="bb">
        <button class="pill" id="btn-layers">Calques</button>
        <button class="pill" id="btn-night">Nuit</button>
        <button class="pill" id="btn-reset">Reset GPS</button>
        <button class="pill on" id="btn-hq">GPS HQ</button>
        <button class="pill" id="btn-log">Journal</button>
      </div>
    </div>
    <div id="tl-panel">
      <div id="tl-hdr">
        <span>GARES</span>
        <span id="sens-b" class="b bg">--</span>
      </div>
      <div id="tl-body">
        <div id="tl-arr"></div>
        <div id="tl-track"><div class="tl-rail"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- LOG -->
<div id="log-panel">
  <div id="log-hdr"><span>Journal de trajet</span><span id="log-close">x</span></div>
  <div id="log-list"><p style="color:#6b7280;padding:12px;font-size:12px">Aucune entree.</p></div>
  <div id="log-foot"><button id="btn-exp">Export CSV</button></div>
</div>

<!-- LAYERS -->
<div id="layers-panel">
  <div id="layers-hdr"><span>Calques carte</span><span id="layers-close">x</span></div>
  <div id="layers-body"></div>
</div>

<!-- PWA Install -->
<div id="install-banner" class="hidden">
  <div>Installer RFN Tracker</div>
  <button id="btn-install">Installer</button>
  <button id="btn-install-dismiss">x</button>
</div>

<script>
(function() {
'use strict';

// ── CONSTANTS ────────────────────────────────────────────────
var CELL      = 0.5;
var THR_MS    = 800;
var TRACE_MAX = 2000;
var TL_H      = 52;
var SPD_BUF   = 4;
var FREEZE_KM = 0.3;

// ── STATE ────────────────────────────────────────────────────
var S = {
  pos: null, lastProcTs: 0,
  capLisse: 0, speedBuf: [], speedKmh: 0,
  odometre: 0, tracePts: [],
  watchId: null, hqGps: true,
  headingUp: true, autoCentre: true, nightMode: false,
  curLigne: null, curPK: null, curVmax: null, curVseg: null,
  sensMarche: 0, prevPKval: null, prevPKts: 0,
  tlStations: [], tlOffset: 0,
  loggedSet: {},
  chronoRun: false, chronoStart: 0, chronoElapsed: 0,
  journal: [],
  ligneFeats: [],
  garesArr: [], garesIdx: {},
  iteArr:   [], iteIdx:   {},
  triArr:   [], triIdx:   {},
  vmaxArr:  [],
  spatialIdx: {},
  layerVis: { lignes:true, gares:true, ite:true, triages:true, trace:true, vmax:false },
  iFrom: null, iTo: null, iT0: 0,
  mapReady: false,
};

// ── HELPERS ──────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function tx(id, v){ var e=$(id); if(e) e.textContent=v; }
function on(id, ev, fn){ var e=$(id); if(e) e.addEventListener(ev,fn); }
function loadPct(p,msg){
  $('loading-bar').style.width = p+'%';
  if(msg) tx('loading-msg', msg);
}
function loadDone(){ $('loading').classList.add('done'); }

// ── MAP ──────────────────────────────────────────────────────
var map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: 'https://cdn.jsdelivr.net/npm/@fontsource/noto-sans@5.0.3/files/{fontstack}/{range}.pbf',
    sources: {
      osm: {
        type: 'raster',
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '(c) OpenStreetMap contributors'
      }
    },
    layers: [{ id:'osm-tiles', type:'raster', source:'osm' }]
  },
  center: [2.430, 48.625],
  zoom: 13,
  bearing: 0
});

// Remove default attribution control to avoid constructor options issues
map.addControl(new maplibregl.AttributionControl({ compact: true }));

// Arrow marker
var markerEl = document.createElement('div');
markerEl.style.cssText = 'width:32px;height:32px;display:flex;align-items:center;justify-content:center;';
markerEl.innerHTML = '<svg width="32" height="32" viewBox="0 0 32 32" id="arr-svg"><polygon points="16,2 27,29 16,22 5,29" fill="#0284c7" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/></svg>';
var arrSvg = markerEl.querySelector('#arr-svg');
var gpsMk = new maplibregl.Marker({ element: markerEl, anchor: 'center' })
  .setLngLat([2.430, 48.625]).addTo(map);

// ── SPATIAL ──────────────────────────────────────────────────
function cellKey(lat, lon){
  return Math.floor(lat/CELL)+'_'+Math.floor(lon/CELL);
}
function neighbors9(lat, lon){
  var r=Math.floor(lat/CELL), c=Math.floor(lon/CELL), k=[];
  for(var dr=-1;dr<=1;dr++) for(var dc=-1;dc<=1;dc++) k.push((r+dr)+'_'+(c+dc));
  return k;
}
function neighbors25(lat, lon){
  var r=Math.floor(lat/CELL), c=Math.floor(lon/CELL), k=[];
  for(var dr=-2;dr<=2;dr++) for(var dc=-2;dc<=2;dc++) k.push((r+dr)+'_'+(c+dc));
  return k;
}
function idxPt(idx, lat, lon, obj){
  var k=cellKey(lat,lon);
  if(!idx[k]) idx[k]=[];
  idx[k].push(obj);
}
function idxLine(feat){
  var cs=feat.geometry.coordinates, n=cs.length;
  for(var i=0;i<n;i+=5){
    var k=cellKey(cs[i][1], cs[i][0]);
    if(!S.spatialIdx[k]) S.spatialIdx[k]=[];
    var arr=S.spatialIdx[k];
    var found=false;
    for(var j=0;j<arr.length;j++) if(arr[j]===feat){found=true;break;}
    if(!found) arr.push(feat);
  }
  // last point
  var k2=cellKey(cs[n-1][1], cs[n-1][0]);
  if(!S.spatialIdx[k2]) S.spatialIdx[k2]=[];
  var arr2=S.spatialIdx[k2];
  var found2=false;
  for(var j2=0;j2<arr2.length;j2++) if(arr2[j2]===feat){found2=true;break;}
  if(!found2) arr2.push(feat);
}

// ── GEOMETRY ─────────────────────────────────────────────────
function hav(la1,lo1,la2,lo2){
  var R=6371000,p1=la1*Math.PI/180,p2=la2*Math.PI/180;
  var dp=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
  var a=Math.sin(dp/2)*Math.sin(dp/2)+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function brng(la1,lo1,la2,lo2){
  var p1=la1*Math.PI/180,p2=la2*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
  var y=Math.sin(dl)*Math.cos(p2);
  var x=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl);
  return(Math.atan2(y,x)*180/Math.PI+360)%360;
}
function capCard(d){return['N','NE','E','SE','S','SO','O','NO'][Math.round(d/45)%8];}
function aDiff(a,b){var d=((b-a)%360+360)%360;return d>180?d-360:d;}

function parsePK(s){
  if(!s) return NaN;
  s=String(s).trim();
  var m=s.match(/^(\d+)\+(\d+)$/);
  if(m) return parseFloat(m[1])+parseFloat(m[2])/1000;
  return parseFloat(s)||0;
}
function fmtPK(pk){
  if(pk==null||isNaN(pk)) return '--+---';
  var km=Math.floor(pk),m=Math.round((pk-km)*1000);
  return km+'+'+('000'+m).slice(-3);
}
function normCL(s){
  return String(parseInt(String(s||'0'),10)||0);
}

function ptSegT(px,py,ax,ay,bx,by){
  var dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(l2===0) return 0;
  var t=((px-ax)*dx+(py-ay)*dy)/l2;
  return t<0?0:t>1?1:t;
}
function ptSegDist(px,py,ax,ay,bx,by){
  var t=ptSegT(px,py,ax,ay,bx,by);
  var qx=ax+t*(bx-ax),qy=ay+t*(by-ay);
  return Math.hypot(px-qx,py-qy);
}

// ── CSV PARSER ───────────────────────────────────────────────
function parseCSV(txt, sep){
  var lines=txt.replace(/\r/g,'').split('\n');
  if(lines.length<2) return [];
  var hdrs=lines[0].replace(/^\uFEFF/,'').split(sep);
  for(var i=0;i<hdrs.length;i++) hdrs[i]=hdrs[i].trim();
  var out=[];
  for(var r=1;r<lines.length;r++){
    if(!lines[r].trim()) continue;
    var v=lines[r].split(sep);
    var o={};
    for(var c=0;c<hdrs.length;c++) o[hdrs[c]]=(v[c]||'').trim();
    out.push(o);
  }
  return out;
}

// ── DATA LOADING ─────────────────────────────────────────────
function loadAll(){
  loadPct(5,'Chargement des donnees...');

  var fetches = [
    fetch('formes-des-lignes-du-rfn.geojson').then(function(r){return r.json();}),
    fetch('liste-des-gares.csv').then(function(r){return r.text();}),
    fetch('liste-des-installations-terminales-embranchees.csv').then(function(r){return r.text();}),
    fetch('liste-des-triages.csv').then(function(r){return r.text();}),
    fetch('vitesse-maximale-nominale-sur-ligne.csv').then(function(r){return r.text();}),
  ];

  Promise.allSettled(fetches).then(function(results){
    var rGJ=results[0], rGares=results[1], rIte=results[2], rTri=results[3], rVmax=results[4];
    var gj=null;

    loadPct(20,'Index des lignes...');
    if(rGJ.status==='fulfilled'){
      gj=rGJ.value;
      S.ligneFeats=gj.features.filter(function(f){return f.geometry&&f.geometry.type==='LineString';});
      for(var i=0;i<S.ligneFeats.length;i++) idxLine(S.ligneFeats[i]);
      console.log('Lignes:',S.ligneFeats.length);
    } else { console.warn('GeoJSON manquant — servir via HTTP'); }

    loadPct(40,'Gares...');
    if(rGares.status==='fulfilled'){
      var rows=parseCSV(rGares.value,';');
      for(var i=0;i<rows.length;i++){
        var r=rows[i];
        var lon=parseFloat(r.X_WGS84),lat=parseFloat(r.Y_WGS84),pk=parsePK(r.PK);
        if(isNaN(lon)||isNaN(lat)||isNaN(pk)) continue;
        r._lon=lon;r._lat=lat;r._pk=pk;r._type='gare';
        r._voy=(r.VOYAGEURS||'').toUpperCase()==='O';
        r._fret=(r.FRET||'').toUpperCase()==='O';
        if(!r.IDGAIA) r.IDGAIA='g_'+r.CODE_UIC;
        S.garesArr.push(r);
        idxPt(S.garesIdx,lat,lon,r);
      }
      console.log('Gares:',S.garesArr.length);
    }

    loadPct(55,'ITE...');
    if(rIte.status==='fulfilled'){
      var rows=parseCSV(rIte.value,';');
      for(var i=0;i<rows.length;i++){
        var r=rows[i];
        var lon=parseFloat(r.X_WGS84),lat=parseFloat(r.Y_WGS84);
        if(isNaN(lon)||isNaN(lat)) continue;
        r._lon=lon;r._lat=lat;r._pk=parsePK(r.PK);r._type='ite';
        r.LIBELLE=r.GARE||'ITE';
        if(!r.IDGAIA) r.IDGAIA='i_'+r.CODE_LIGNE+'_'+r.PK;
        S.iteArr.push(r);
        idxPt(S.iteIdx,lat,lon,r);
      }
      console.log('ITE:',S.iteArr.length);
    }

    loadPct(65,'Triages...');
    if(rTri.status==='fulfilled'){
      var rows=parseCSV(rTri.value,';');
      for(var i=0;i<rows.length;i++){
        var r=rows[i];
        var lon=parseFloat(r.X_WGS84),lat=parseFloat(r.Y_WGS84);
        if(isNaN(lon)||isNaN(lat)) continue;
        r._lon=lon;r._lat=lat;r._pk=parsePK(r.PK);r._type='triage';
        if(!r.IDGAIA) r.IDGAIA='t_'+r.CODE_LIGNE+'_'+r.PK;
        S.triArr.push(r);
        idxPt(S.triIdx,lat,lon,r);
      }
      console.log('Triages:',S.triArr.length);
    }

    loadPct(78,'Vitesses...');
    if(rVmax.status==='fulfilled'){
      var rows=parseCSV(rVmax.value,';');
      for(var i=0;i<rows.length;i++){
        var r=rows[i];
        var xd=parseFloat(r.X_D_WGS84),yd=parseFloat(r.Y_D_WGS84);
        var xf=parseFloat(r.X_F_WGS84),yf=parseFloat(r.Y_F_WGS84);
        if(isNaN(xd)||isNaN(yd)||isNaN(xf)||isNaN(yf)) continue;
        var pkd=parsePK(r.PKD),pkf=parsePK(r.PKF);
        if(isNaN(pkd)||isNaN(pkf)) continue;
        S.vmaxArr.push({
          cl:normCL(r.CODE_LIGNE), lib:r.LIB_LIGNE||'',
          vmax:parseInt(r.V_MAX)||0,
          pkd:pkd,pkf:pkf,
          lonD:xd,latD:yd,lonF:xf,latF:yf
        });
      }
      console.log('Vitesses:',S.vmaxArr.length);
    }

    loadPct(90,'Carte...');
    // Init map layers once map AND data are both ready
    whenMapReady(function(){ initLayers(gj); });
  });
}

// ── FIND NEAREST LINE + PK ────────────────────────────────────
function findLine(lat,lon){
  if(!S.ligneFeats.length) return null;
  var keys=neighbors9(lat,lon);
  var cands=[];
  for(var ki=0;ki<keys.length;ki++){
    var arr=S.spatialIdx[keys[ki]];
    if(!arr) continue;
    for(var fi=0;fi<arr.length;fi++){
      var f=arr[fi],found=false;
      for(var ci=0;ci<cands.length;ci++) if(cands[ci]===f){found=true;break;}
      if(!found) cands.push(f);
    }
  }
  if(!cands.length) return null;

  // Find top 3 nearest segments
  var top=[];
  for(var fi=0;fi<cands.length;fi++){
    var feat=cands[fi];
    var cs=feat.geometry.coordinates;
    for(var si=0;si<cs.length-1;si++){
      var ax=cs[si][0],ay=cs[si][1],bx=cs[si+1][0],by=cs[si+1][1];
      var dd=ptSegDist(lon,lat,ax,ay,bx,by)*111320;
      if(top.length<3){
        top.push({feat:feat,si:si,dd:dd,t:ptSegT(lon,lat,ax,ay,bx,by)});
        top.sort(function(a,b){return a.dd-b.dd;});
      } else if(dd<top[2].dd){
        top[2]={feat:feat,si:si,dd:dd,t:ptSegT(lon,lat,ax,ay,bx,by)};
        top.sort(function(a,b){return a.dd-b.dd;});
      }
    }
  }
  if(!top.length) return null;

  var res=[];
  for(var i=0;i<top.length;i++){
    var e=top[i];
    var p=e.feat.properties;
    var pkDeb=parsePK(p.pk_debut_r),pkFin=parsePK(p.pk_fin_r);
    var cs=e.feat.geometry.coordinates;
    var cum=0,total=0;
    for(var j=0;j<cs.length-1;j++){
      var d=hav(cs[j][1],cs[j][0],cs[j+1][1],cs[j+1][0]);
      if(j<e.si) cum+=d;
      total+=d;
    }
    var sl=hav(cs[e.si][1],cs[e.si][0],cs[e.si+1][1],cs[e.si+1][0]);
    var ratio=total>0?(cum+e.t*sl)/total:0;
    res.push({pk:pkDeb+ratio*(pkFin-pkDeb),cl:p.code_ligne,lib:p.libelle,dd:e.dd});
  }
  var wS=0,pkS=0;
  for(var i=0;i<res.length;i++){var w=res[i].dd>0?1/res[i].dd:1e9;wS+=w;pkS+=w*res[i].pk;}
  return{pk:wS>0?pkS/wS:res[0].pk, cl:res[0].cl, lib:res[0].lib, dd:res[0].dd};
}

// ── VMAX LOOKUP ───────────────────────────────────────────────
function findVmax(cl,pk){
  if(!S.vmaxArr.length||!cl||pk==null) return null;
  var ncl=normCL(cl);
  for(var i=0;i<S.vmaxArr.length;i++){
    var v=S.vmaxArr[i];
    if(v.cl!==ncl) continue;
    var lo=v.pkd<v.pkf?v.pkd:v.pkf, hi=v.pkd>v.pkf?v.pkd:v.pkf;
    if(pk>=lo&&pk<=hi) return v;
  }
  return null;
}

// ── GATHER STATIONS ───────────────────────────────────────────
function gatherStations(lat,lon,cl,curPK){
  var ncl=normCL(cl);
  var keys=neighbors25(lat,lon);
  var seen={}, pts=[];

  function addFrom(idx){
    for(var ki=0;ki<keys.length;ki++){
      var arr=idx[keys[ki]];
      if(!arr) continue;
      for(var i=0;i<arr.length;i++){
        var r=arr[i];
        if(seen[r.IDGAIA]) continue;
        if(normCL(r.CODE_LIGNE)!==ncl) continue;
        seen[r.IDGAIA]=true;
        pts.push(r);
      }
    }
  }
  addFrom(S.garesIdx);
  addFrom(S.iteIdx);
  addFrom(S.triIdx);

  // Fallback: full scan if nothing found
  if(!pts.length){
    var arrs=[S.garesArr,S.iteArr,S.triArr];
    for(var ai=0;ai<arrs.length;ai++){
      for(var i=0;i<arrs[ai].length;i++){
        var r=arrs[ai][i];
        if(normCL(r.CODE_LIGNE)===ncl&&!seen[r.IDGAIA]){
          seen[r.IDGAIA]=true;pts.push(r);
        }
      }
    }
  }

  pts.sort(function(a,b){return Math.abs(a._pk-curPK)-Math.abs(b._pk-curPK);});
  if(pts.length>20) pts=pts.slice(0,20);
  for(var i=0;i<pts.length;i++) pts[i]._dist=hav(lat,lon,pts[i]._lat,pts[i]._lon);
  return pts;
}

// ── GPS ───────────────────────────────────────────────────────
function startGPS(){
  if(S.watchId!=null) navigator.geolocation.clearWatch(S.watchId);
  var opts=S.hqGps
    ?{enableHighAccuracy:true,maximumAge:0,timeout:8000}
    :{enableHighAccuracy:false,maximumAge:2000,timeout:15000};
  S.watchId=navigator.geolocation.watchPosition(onGPS,function(e){
    console.warn('GPS err:',e.code,e.message);
  },opts);
}

function onGPS(pos){
  var now=Date.now();
  var lo=pos.coords.longitude,la=pos.coords.latitude;
  if(S.pos){S.iFrom=[S.pos.lon,S.pos.lat];S.iTo=[lo,la];S.iT0=now;requestAnimationFrame(animInterp);}
  if(now-S.lastProcTs<THR_MS) return;
  S.lastProcTs=now;
  procGPS(pos);
}

function procGPS(pos){
  var lat=pos.coords.latitude,lon=pos.coords.longitude,acc=pos.coords.accuracy;
  var now=Date.now();

  // Speed
  var spd=0;
  if(S.pos){
    var d=hav(S.pos.lat,S.pos.lon,lat,lon);
    var dt=(now-S.pos.ts)/1000;
    if(dt>0) spd=(d/dt)*3.6;
  }
  S.speedBuf.push(spd);
  if(S.speedBuf.length>SPD_BUF) S.speedBuf.shift();
  var s=0;for(var i=0;i<S.speedBuf.length;i++) s+=S.speedBuf[i];
  S.speedKmh=s/S.speedBuf.length;

  // Cap
  if(S.pos){
    var rc=brng(S.pos.lat,S.pos.lon,lat,lon);
    var diff=aDiff(S.capLisse,rc);
    S.capLisse=(S.capLisse+0.3*diff+360)%360;
  }

  // Odo
  if(S.pos) S.odometre+=hav(S.pos.lat,S.pos.lon,lat,lon)/1000;

  S.pos={lat:lat,lon:lon,ts:now};
  gpsMk.setLngLat([lon,lat]);

  // Trace
  S.tracePts.push([lon,lat]);
  if(S.tracePts.length>TRACE_MAX) S.tracePts.shift();
  try{
    map.getSource('trace').setData({type:'Feature',geometry:{type:'LineString',coordinates:S.tracePts}});
  }catch(e){}

  // Camera
  if(S.autoCentre){
    var opts={center:[lon,lat],duration:350};
    if(S.headingUp) opts.bearing=S.capLisse;
    map.easeTo(opts);
  }
  arrSvg.style.transform=S.headingUp?'':'rotate('+S.capLisse+'deg)';

  // Line
  var info=findLine(lat,lon);
  if(info){
    S.curLigne=info.cl; S.curPK=info.pk;
    detectSens(info.pk);
    var vseg=findVmax(info.cl,info.pk);
    S.curVmax=vseg?vseg.vmax:null; S.curVseg=vseg;
    updateHdr(info,acc);
    renderTL(lat,lon);
  }

  tx('b-spd',Math.round(S.speedKmh)+' km/h');
  tx('b-cap',Math.round(S.capLisse)+' '+capCard(S.capLisse));
  tx('b-voie','voie '+(info?Math.round(info.dd):'--')+'m');
  tx('b-odo',S.odometre.toFixed(1)+' km');
  var ga=$('b-gps');
  ga.textContent='GPS '+Math.round(acc)+'m';
  ga.className='b '+(acc<15?'gr':acc<40?'or':'rd');
}

// ── SENS ─────────────────────────────────────────────────────
function detectSens(pk){
  var now=Date.now();
  if(S.prevPKval!==null&&now-S.prevPKts<15000){
    var d=pk-S.prevPKval;
    if(Math.abs(d)>0.005) S.sensMarche=d>0?1:-1;
  }
  S.prevPKval=pk; S.prevPKts=now;
}

// ── HEADER ───────────────────────────────────────────────────
function updateHdr(info,acc){
  var pkel=$('pk-el');
  pkel.textContent='PK '+fmtPK(info.pk);
  if(S.curVmax&&S.speedKmh>S.curVmax+2){ pkel.classList.add('blink');flash(); }
  else pkel.classList.remove('blink');

  $('ligne-el').textContent='L'+info.cl+(info.lib?' - '+info.lib.slice(0,28):'');

  var bv=$('b-vmax'),bs=$('b-seg');
  if(S.curVmax){
    var pct=Math.min(100,S.speedKmh/S.curVmax*100);
    $('vmx-wrap').style.display='block';
    $('vmx-bar').style.width=pct+'%';
    $('vmx-bar').style.background=pct<80?'#16a34a':pct<100?'#f97316':'#ef4444';
    bv.style.display='';bv.textContent='Vmax '+S.curVmax;
    bv.className='b '+(pct<80?'gr':pct<100?'or':'rd');
    if(S.curVseg){
      bs.style.display='';
      bs.textContent=fmtPK(S.curVseg.pkd)+' '+fmtPK(S.curVseg.pkf);
      bs.className='b bg';
    }
  } else { bv.style.display='none'; bs.style.display='none'; }
}

function flash(){
  var el=$('flash');
  el.style.opacity='0.28';
  clearTimeout(flash._t);
  flash._t=setTimeout(function(){el.style.opacity='0';},400);
}

// ── TIMELINE ─────────────────────────────────────────────────
var tlRaf=null, tlLast=0;

function renderTL(lat,lon){
  if(!S.curLigne||S.curPK==null) return;
  S.tlStations=gatherStations(lat,lon,S.curLigne,S.curPK);
  var sb=$('sens-b');
  if(S.sensMarche>0){sb.textContent='Impair V1';sb.className='b bl';}
  else if(S.sensMarche<0){sb.textContent='Pair V2';sb.className='b yw';}
  else{sb.textContent='--';sb.className='b bg';}
  drawTL(lat,lon);
  if(!tlRaf) tlRaf=requestAnimationFrame(animTL);
}

function drawTL(lat,lon){
  var track=$('tl-track');
  var items=track.querySelectorAll('.si');
  for(var i=0;i<items.length;i++) items[i].parentNode.removeChild(items[i]);
  if(!S.tlStations.length) return;

  var body=$('tl-body');
  var centerY=body.offsetHeight/2;

  var ordered=S.tlStations.slice();
  if(S.sensMarche>=0) ordered.sort(function(a,b){return a._pk-b._pk;});
  else ordered.sort(function(a,b){return b._pk-a._pk;});

  var curIdx=0,minD=Infinity;
  for(var i=0;i<ordered.length;i++){
    var d=Math.abs(ordered[i]._pk-S.curPK);
    if(d<minD){minD=d;curIdx=i;}
  }

  for(var i=0;i<ordered.length;i++){
    var g=ordered[i];
    var el=document.createElement('div');
    el.className='si';
    var dm=g._dist;
    var dtxt=dm<1000?Math.round(dm)+'m':(dm/1000).toFixed(1)+'km';
    var dcls=dm<100?'vnear':dm<500?'near':'';
    var pkd=g._pk-S.curPK;
    var passed=S.sensMarche>=0?pkd<0:pkd>0;
    var frozen=Math.abs(pkd)<FREEZE_KM;
    el.style.top=(centerY+(i-curIdx)*TL_H-TL_H/2)+'px';
    var typeL=g._type==='ite'?'ITE':g._type==='triage'?'TRIAGE':'GARE';
    var extra=g._type==='gare'?(g._voy?' [V]':'')+(g._fret?' [F]':''):'';
    el.innerHTML=
      '<div class="si-dot"></div>'+
      '<div class="si-info">'+
        '<div class="si-name">'+(g.LIBELLE||'--')+extra+'</div>'+
        '<div class="si-pk">'+(g.PK||'')+'</div>'+
        '<div class="si-dist '+dcls+'">'+dtxt+' <span class="si-type '+g._type+'">'+typeL+'</span></div>'+
      '</div>';
    if(frozen){
      el.classList.add('frozen');
      if(!S.loggedSet[g.IDGAIA]&&Math.abs(pkd)<0.05){
        logStation(g);S.loggedSet[g.IDGAIA]=true;
      }
    } else { delete S.loggedSet[g.IDGAIA]; }
    if(passed&&!frozen) el.classList.add('passed');
    track.appendChild(el);
  }
}

function animTL(ts){
  tlRaf=null;
  if(!S.pos) return;
  var dt=ts-(tlLast||ts); tlLast=ts;
  var pxs=S.speedKmh*0.5;
  var dir=S.sensMarche>=0?-1:1;
  S.tlOffset+=dir*pxs*(dt/1000);
  if(Math.abs(S.tlOffset)>=TL_H){
    S.tlOffset=S.tlOffset%TL_H;
    if(S.pos&&S.curLigne) drawTL(S.pos.lat,S.pos.lon);
  }
  $('tl-track').style.transform='translateY('+S.tlOffset+'px)';
  tlRaf=requestAnimationFrame(animTL);
}

// ── LOG ───────────────────────────────────────────────────────
function logStation(g){
  S.journal.push({
    heure:new Date().toTimeString().slice(0,8),
    gare:g.LIBELLE||'--',pk:fmtPK(g._pk),type:g._type||'gare',
    vitesse:Math.round(S.speedKmh),odometre:S.odometre.toFixed(2),
    ligne:g.CODE_LIGNE||'--',vmax:S.curVmax||'--'
  });
  refreshLog();
}
function refreshLog(){
  var list=$('log-list');
  if(!S.journal.length){list.innerHTML='<p style="color:#6b7280;padding:12px;font-size:12px">Aucune entree.</p>';return;}
  var html='';
  for(var i=S.journal.length-1;i>=0;i--){
    var e=S.journal[i];
    html+='<div class="log-e"><span class="lt">'+e.heure+'</span> <span class="lg">'+e.gare+'</span>'
      +' <span class="lt">['+e.type.toUpperCase()+']</span><br>'
      +'<span class="ld">PK '+e.pk+' - '+e.vitesse+' km/h - '+e.odometre+' km - L'+e.ligne
      +(e.vmax!=='--'?' - Vmax '+e.vmax:'')+'</span></div>';
  }
  list.innerHTML=html;
}

// ── INTERP ───────────────────────────────────────────────────
function animInterp(){
  if(!S.iFrom||!S.iTo) return;
  var t=Math.min(1,(Date.now()-S.iT0)/THR_MS);
  var lo=S.iFrom[0]+t*(S.iTo[0]-S.iFrom[0]);
  var la=S.iFrom[1]+t*(S.iTo[1]-S.iFrom[1]);
  gpsMk.setLngLat([lo,la]);
  if(S.autoCentre) map.setCenter([lo,la]);
  if(t<1) requestAnimationFrame(animInterp);
}

// ── CLOCK ────────────────────────────────────────────────────
setInterval(function(){
  tx('clock-el',new Date().toTimeString().slice(0,8));
  if(S.chronoRun) tx('chrono-el',msHMS(S.chronoElapsed+(Date.now()-S.chronoStart)));
},1000);
function msHMS(ms){
  var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return pad(h)+':'+pad(m)+':'+pad(sc);
}
function pad(n){return n<10?'0'+n:''+n;}

// ── WAKE LOCK ────────────────────────────────────────────────
function reqWL(){try{navigator.wakeLock&&navigator.wakeLock.request('screen');}catch(e){}}
reqWL();
document.addEventListener('visibilitychange',function(){if(!document.hidden)reqWL();});

// ── MAP EVENTS ────────────────────────────────────────────────
map.on('dragstart',function(e){if(e.originalEvent){S.autoCentre=false;$('btn-ctr').style.display='flex';}});
map.on('zoomstart',function(e){if(e.originalEvent){S.autoCentre=false;$('btn-ctr').style.display='flex';}});

// ── BUTTONS ───────────────────────────────────────────────────
on('btn-hup','click',function(){
  S.headingUp=!S.headingUp;
  tx('btn-hup',S.headingUp?'Heading N':'Nord fixe');
  if(!S.headingUp){map.easeTo({bearing:0,duration:400});arrSvg.style.transform='rotate('+S.capLisse+'deg)';}
  else arrSvg.style.transform='';
});
on('btn-ctr','click',function(){
  S.autoCentre=true;$('btn-ctr').style.display='none';
  if(S.pos){var o={center:[S.pos.lon,S.pos.lat],duration:400};if(S.headingUp)o.bearing=S.capLisse;map.easeTo(o);}
});
on('btn-night','click',function(){
  S.nightMode=!S.nightMode;
  $('map').style.filter=S.nightMode?'brightness(0.45)':'';
  document.body.style.background=S.nightMode?'#000':'#0a0a0a';
  tx('btn-night',S.nightMode?'Jour':'Nuit');
  this.classList.toggle('on',S.nightMode);
});
on('btn-reset','click',function(){
  navigator.geolocation.clearWatch(S.watchId);S.watchId=null;
  S.pos=null;S.lastProcTs=0;S.capLisse=0;S.speedBuf=[];S.speedKmh=0;
  S.odometre=0;S.tracePts=[];S.journal=[];S.loggedSet={};
  S.chronoRun=false;S.chronoElapsed=0;S.prevPKval=null;S.sensMarche=0;S.tlOffset=0;
  tx('chrono-el','00:00:00');tx('btn-chr','DEPART');tx('b-odo','0.0 km');tx('pk-el','PK --+---');
  try{map.getSource('trace').setData({type:'Feature',geometry:{type:'LineString',coordinates:[]}});}catch(e){}
  refreshLog();startGPS();
});
on('btn-hq','click',function(){
  S.hqGps=!S.hqGps;
  tx('btn-hq',S.hqGps?'GPS HQ':'GPS STD');
  this.classList.toggle('on',S.hqGps);
  navigator.geolocation.clearWatch(S.watchId);startGPS();
});
on('btn-log','click',function(){$('log-panel').classList.add('open');});
on('log-close','click',function(){$('log-panel').classList.remove('open');});
on('btn-layers','click',function(){$('layers-panel').classList.add('open');});
on('layers-close','click',function(){$('layers-panel').classList.remove('open');});
on('btn-exp','click',function(){
  if(!S.journal.length){alert('Aucune donnee.');return;}
  var hdrs='heure,gare,type,pk,vitesse_kmh,odometre_km,ligne,vmax\n';
  var rows='';
  for(var i=0;i<S.journal.length;i++){
    var e=S.journal[i];
    rows+=e.heure+',"'+e.gare+'",'+e.type+','+e.pk+','+e.vitesse+','+e.odometre+','+e.ligne+','+e.vmax+'\n';
  }
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([hdrs+rows],{type:'text/csv'}));
  a.download='trajet_rfn_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
});
on('btn-chr','click',function(){
  if(!S.chronoRun){S.chronoRun=true;S.chronoStart=Date.now()-S.chronoElapsed;tx('btn-chr','STOP');}
  else{S.chronoRun=false;S.chronoElapsed=Date.now()-S.chronoStart;tx('btn-chr','DEPART');}
});

// ── PWA ───────────────────────────────────────────────────────
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;$('install-banner').classList.remove('hidden');
});
on('btn-install','click',function(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(){$('install-banner').classList.add('hidden');deferredPrompt=null;});
});
on('btn-install-dismiss','click',function(){$('install-banner').classList.add('hidden');});

// ── SERVICE WORKER ────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(e){console.warn('SW:',e);});
}

// ── DEMO ─────────────────────────────────────────────────────
function startDemo(){
  console.log('Mode demo actif');
  var path=[
    [48.8445,2.3735],[48.8380,2.3692],[48.8300,2.3645],
    [48.8220,2.3601],[48.8140,2.3560],[48.8060,2.3521],
    [48.7980,2.3490],[48.7900,2.3461],[48.7820,2.3432],[48.7740,2.3400]
  ];
  var idx=0;
  setInterval(function(){
    if(idx>=path.length) idx=0;
    var pt=path[idx++];
    procGPS({coords:{latitude:pt[0],longitude:pt[1],accuracy:8,speed:25}});
  },1600);
}

// ── INIT ──────────────────────────────────────────────────────
// loadAll handles its own map-ready synchronization via whenMapReady()
// GPS is started inside initLayers() once everything is set up
loadAll();

// Demo fallback if GPS denied after 10s
setTimeout(function(){if(!S.pos&&S.mapReady)startDemo();},10000);

})();
